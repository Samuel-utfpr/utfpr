<script>
  var linhas = document.getElementsByTagName("tr");

  for (var i = 0; i < linhas.length; i++) {
    var celulas = linhas[i].getElementsByTagName("td");
    for (var j = 0; j < celulas.length; j++) {
      if ( (i + j) % 2 == 0 ) {
        celulas[j].style.backgroundColor = "white";
      } else {
