<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <title>Exemplo Position Relative</title>
 <style>
 .caixa {
 width: 25px;
 height: 25px;
 border: 2px solid black;
 position: relative;
 }
 .caixa1 {
 top: 50%;
 left: 25%;
 border: 2px solid black;
 }
 .caixa2 {
 top: 25%;
 left: 25%;
 border: 2px solid black;
 }
 .caixa3 {
 top: 25%;
 right: 0%;
 border: 2px solid black;
 }
 </style>
</head>
<body>
 <div class="caixa caixa1">1</div>
 <div class="caixa caixa2">2</div>
 <div class="caixa caixa3">3</div>
</body>
</html>
